# Workspace-level config.
# Device-specific target config is in device/.cargo/config.toml.
# This file is intentionally minimal so that `cargo test -p dynatac-core`
# builds for the host platform.

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg",  "espidf_time64"]

